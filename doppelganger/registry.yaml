# Source of truth: which agents exist and who may call them.
# The dispatcher validates queue rows against this file; relevant parts
# are injected into the agent's prompt. `tools` becomes --allowedTools and
# `model` becomes --model for claude -p (omit model → CLI default).
agents:
  # Cheap, fast gate over incoming chat. Knows the harness's identity (call sign) and
  # capabilities; decides only whether a message is directed at the harness. Acts on nothing —
  # it can only order `chat`. No domain tools.
  triage:
    can_be_called_by: [chat-ingest]   # top-level (parent=null); documents intent
    tools: "Read,Write"               # Write is only for the out.json contract — no domain access
    model: haiku

  # The I/O security principal for untrusted external text. Composes the reply and delegates
  # domain work as orders. Holds NO domain credentials (no gws/Fortnox) — it can only talk and
  # delegate. Capable model: chat is where intent is understood and turned into action.
  chat:
    can_be_called_by: [triage]
    tools: "Read,Write"
    model: opus

  # Cheap, fast gate over incoming finance email (mirrors `triage` for the inbox path). Sees only
  # untrusted message METADATA ({messageId, from, subject, snippet, attachments}) — never attachment
  # bytes. Decides one thing: is this a bank statement (→ reconcile) or a document (→ intake), then
  # orders the credentialed entrepreneur to fetch + process that ONE message. Acts on nothing itself —
  # no domain tools, can ONLY order `entrepreneur`.
  inbox:
    can_be_called_by: [inbox-ingest]  # top-level (parent=null); documents intent
    tools: "Read,Write"               # Write is only for the out.json contract — no domain access
    model: haiku

  # Calendar agent. Scoped to gws calendar only — even an injected order can't reach
  # gmail/drive/Fortnox. Reachable from the schedule (morning brief) and from chat (delegation).
  planner:
    can_be_called_by: [schedule, chat]
    tools: "Bash(gws calendar:*),Bash(date:*),Read,Write"
    model: sonnet

  # The entrepreneur: the credentialed finance worker. Self-contained — its finance logic lives in
  # its own local .claude/skills (vendored; no reach into the nilsark plugin or any repo path), and
  # its config comes from its injected `## Settings` (no config-file reads). Does the JUDGMENT half of
  # the finance run — payment-status refresh, anomaly scan, month-close DRAFTS, and the todo/push. It
  # no longer collects or classifies: the TS `intake`/`reconcile` orchestrators keep `state.md`
  # current and it reads that ledger. Reachable from the schedule (the heartbeat cron fires the `run` task) and
  # from chat (a verified person can ask for a run). The event-driven intake/reconcile path no longer
  # reaches it — the `inbox` gate routes to the scoped TS `intake`/`reconcile` orchestrators instead,
  # so this credentialed agent is only ever started by the schedule or a verified operator. It reads
  # untrusted email/attachments, so the grant is deliberately narrow:
  #   - Gmail: read (`users:*`) + DRAFT form only — no bare `+send`, so it can't transmit email.
  #   - Drive: only get/list/update/+upload — NO `files delete` (can't destroy records) and NO
  #     `permissions` (can't share a file out to exfiltrate). Pair with a `drive.file`-scoped token.
  #   - NO `python3`/`node -c` arbitrary exec. No attachment download/decode anymore (collection moved
  #     to the TS path), so the old `basenc` base64 grant is gone too.
  #   - Never pays / never does BankID (no tools for either).
  entrepreneur:
    can_be_called_by: [schedule, chat]
    tools: "Bash(gws gmail users:*),Bash(gws gmail +send --draft:*),Bash(gws drive files get:*),Bash(gws drive files list:*),Bash(gws drive files update:*),Bash(gws drive +upload:*),Bash(date:*),Bash(jq:*),Bash(mkdir:*),Bash(mv:*),Bash(cd:*),Read,Write,Edit,Skill"
    model: sonnet
    max_concurrency: 1

  # First split-out judgment kernel of the finance domain (the entrepreneur decomposition). Stateless:
  # given ONE already-downloaded document, classify it + extract its fields and return them as the
  # out.json `result`. No Drive, no Gmail, no state — pure judgment, so it's cheap, isolated, and
  # independently testable. The finance orchestrator dispatches it per document and does the filing.
  classifier:
    can_be_called_by: [entrepreneur, intake]  # the finance orchestrator (entrepreneur today, intake now) dispatches it
    tools: "Read,Write,Skill"          # Read the file, Skill for the invoice tools, Write the out.json
    model: sonnet

  # The finance intake orchestrator (the entrepreneur decomposition, live). NOT an LLM: the worker runs
  # `runIntake` in TS for this agent — download the attachment(s), dispatch `classifier` for judgment,
  # normalize + file to Drive + state.md + state.json. Ordered by the `inbox` router for documents, in
  # place of a full entrepreneur run. No tools/model: it's code, not a claude run.
  intake:
    can_be_called_by: [inbox]
    tools: ""
    kind: orchestrator

  # Second judgment kernel: match a bank statement against the month's unpaid invoices. Stateless —
  # given the statement file + the invoice list, return each transaction with its matched invoice +
  # confidence. No Drive/Gmail/state; the reconcile orchestrator applies the matches.
  reconciler:
    can_be_called_by: [reconcile, entrepreneur]
    tools: "Read,Write,Skill"
    model: sonnet

  # The finance reconcile orchestrator (TS, not an LLM): the worker runs runReconcile — read the
  # month's unpaid invoices, dispatch `reconciler` for the matching, apply (mark paid + record txns)
  # to state.md + state.json. Triggered by the `inbox` router (a statement emailed in) or the Drive
  # drop-folder poll (a statement uploaded straight to Drive).
  reconcile:
    can_be_called_by: [inbox]
    tools: ""
    kind: orchestrator
