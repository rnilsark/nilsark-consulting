<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DOPPELGÄNGER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#040706;}
  *{box-sizing:border-box;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(45,255,163,.18);border-radius:0;}
  ::-webkit-scrollbar-track{background:transparent;}
  @keyframes breathe{0%,100%{opacity:.55;}50%{opacity:.9;}}
  @keyframes pulse{0%,100%{opacity:.78;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
  @keyframes halopulse{0%,100%{opacity:.30;transform:translate(-50%,-50%) scale(.9);}50%{opacity:.65;transform:translate(-50%,-50%) scale(1.15);}}
  @keyframes pkt{0%{left:var(--x1);top:var(--y1);opacity:0;}12%{opacity:1;}88%{opacity:1;}100%{left:var(--x2);top:var(--y2);opacity:0;}}
  @keyframes drift1{from{transform:translateY(0);}to{transform:translateY(-260px);}}
  @keyframes drift2{from{transform:translateY(0);}to{transform:translateY(-160px);}}
  @keyframes flicker{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @keyframes scan{from{transform:translateY(0);}to{transform:translateY(7px);}}

  .app{position:fixed;inset:0;background:radial-gradient(125% 95% at 50% 36%, #0a1611 0%, #060b09 52%, #040706 100%);font-family:'JetBrains Mono',monospace;color:#2dffa3;overflow:hidden;display:flex;flex-direction:column;}

  .header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 22px;border-bottom:1px solid rgba(45,255,163,0.10);position:relative;z-index:8;}
  .wordmark-group{display:flex;align-items:baseline;gap:12px;flex:1 1 0;min-width:0;overflow:hidden;}
  .wordmark{font-size:16px;font-weight:700;letter-spacing:5px;color:#2dffa3;text-shadow:0 0 12px rgba(45,255,163,.45);white-space:nowrap;}
  .cursor{font-size:13px;color:#2dffa3;animation:flicker 1.1s steps(1) infinite;flex:0 0 auto;}
  .header-right{display:flex;align-items:center;justify-content:flex-end;gap:22px;flex:1 1 0;min-width:0;}
  .windows{display:flex;gap:4px;flex:0 0 auto;}
  .win-btn{font-family:inherit;font-size:9px;letter-spacing:1px;padding:5px 9px;border:1px solid rgba(45,255,163,.12);background:transparent;color:rgba(150,210,180,.45);cursor:pointer;white-space:nowrap;}
  .win-btn.on{border-color:rgba(45,255,163,.4);background:rgba(45,255,163,.12);color:#2dffa3;}
  .stats{display:flex;gap:18px;align-items:center;}
  .stat{display:flex;flex-direction:column;gap:1px;align-items:flex-end;}
  .stat-label{font-size:8px;letter-spacing:2px;color:rgba(150,210,180,.45);}
  .stat-value{font-size:14px;font-weight:500;color:#2dffa3;}
  .stat-value.dim{color:rgba(150,210,180,.5);}

  .stage{position:relative;flex:1;overflow:hidden;}
  .starfield{position:absolute;inset:-50px;pointer-events:none;}
  .edges-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:1;}
  .packets{position:absolute;inset:0;pointer-events:none;}
  .nodes{position:absolute;inset:0;pointer-events:none;}
  .nodes>div{pointer-events:auto;}

  .legend{position:absolute;left:24px;right:24px;bottom:18px;display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;z-index:6;pointer-events:none;font-size:9px;letter-spacing:2px;color:rgba(150,210,180,.5);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .legend i{width:7px;height:7px;border-radius:50%;display:block;font-style:normal;}
  .scanlines{position:absolute;inset:0;pointer-events:none;z-index:7;background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,8,4,0.22) 3px, rgba(0,8,4,0.22) 4px);animation:scan 1.2s steps(2) infinite;mix-blend-mode:overlay;}

  .drawer{border-top:1px solid rgba(45,255,163,.14);background:linear-gradient(180deg, rgba(8,16,12,.97), rgba(5,9,7,.99));height:46px;transition:height .38s cubic-bezier(.4,0,.2,1);position:relative;z-index:9;display:flex;flex-direction:column;}
  .drawer.open{height:340px;}
  .drawer-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 24px;height:46px;flex:0 0 46px;cursor:pointer;}
  .drawer-bar-left{display:flex;align-items:center;gap:14px;min-width:0;}
  .drawer-title{font-size:11px;font-weight:700;letter-spacing:4px;color:#2dffa3;}
  .drawer-count{font-size:9px;letter-spacing:1px;color:rgba(150,210,180,.45);}
  .drawer-ticker{font-size:11px;color:rgba(150,210,180,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .drawer-caret{font-size:12px;color:#2dffa3;flex:0 0 auto;}
  .drawer-body{display:none;flex:1;min-height:0;border-top:1px solid rgba(45,255,163,.08);}
  .drawer.open .drawer-body{display:flex;}

  .inspect{flex:0 0 360px;border-right:1px solid rgba(45,255,163,.08);padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .inspect-empty{display:flex;flex-direction:column;gap:10px;height:100%;justify-content:center;align-items:center;text-align:center;opacity:.55;}
  .inspect-empty .diamonds{font-size:22px;letter-spacing:3px;color:rgba(45,255,163,.5);}
  .inspect-empty .hint{font-size:11px;line-height:1.6;color:rgba(150,210,180,.55);max-width:220px;}
  .inspect-detail{display:flex;flex-direction:column;gap:14px;}
  .inspect-head{display:flex;align-items:center;justify-content:space-between;}
  .micro-label{font-size:8px;letter-spacing:3px;color:rgba(150,210,180,.45);}
  .inspect-back{font-size:9px;letter-spacing:1px;color:rgba(150,210,180,.55);cursor:pointer;}
  .inspect-name{font-size:18px;font-weight:700;letter-spacing:2px;color:#2dffa3;text-shadow:0 0 10px rgba(45,255,163,.4);}
  .inspect-cards{display:flex;gap:8px;flex-wrap:wrap;}
  .inspect-card{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px;border:1px solid rgba(45,255,163,.10);padding:8px 10px;}
  .inspect-card .label{font-size:8px;letter-spacing:2px;color:rgba(150,210,180,.45);}
  .inspect-card .value{font-size:12px;font-weight:500;color:#2dffa3;}
  .inspect-field{display:flex;flex-direction:column;gap:5px;}
  .inspect-field .label{font-size:8px;letter-spacing:2px;color:rgba(150,210,180,.45);}
  .inspect-field .value{font-size:12px;color:rgba(180,230,205,.85);}
  .inspect-field .value.soft{line-height:1.5;color:rgba(180,230,205,.7);text-wrap:pretty;}
  .cfg{display:flex;flex-direction:column;gap:4px;border:1px solid rgba(45,255,163,.10);padding:8px 10px;}
  .cfg-row{display:flex;gap:10px;align-items:baseline;font-size:11px;}
  .cfg-row .k{flex:0 0 96px;color:rgba(150,210,180,.55);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cfg-row .v{flex:1;min-width:0;color:rgba(180,230,205,.85);word-break:break-word;font-variant-numeric:tabular-nums;}
  .spark{display:flex;align-items:flex-end;gap:3px;height:38px;}
  .spark>div{flex:1;min-width:6px;background:rgba(45,255,163,.55);box-shadow:0 0 6px rgba(45,255,163,.35);}

  .feed-pane{flex:1;display:flex;flex-direction:column;min-width:0;}
  .feed-head{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 8px;}
  .feed-rows{flex:1;overflow-y:auto;padding:0 20px 14px;}
  .feed-row{display:flex;gap:12px;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(45,255,163,.045);font-size:12px;}
  .feed-row .time{flex:0 0 62px;color:rgba(150,210,180,.4);font-variant-numeric:tabular-nums;}
  .feed-row .tag{flex:0 0 14px;text-align:center;}
  .feed-row .agent{flex:0 0 78px;color:#2dffa3;letter-spacing:1px;}
  .feed-row .text{flex:1;color:rgba(180,230,205,.62);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .feed-row .cost{flex:0 0 auto;color:rgba(150,210,180,.7);font-variant-numeric:tabular-nums;}

  @media (max-width:640px){
    /* header: wordmark on its own line, controls + stats on a second row */
    .header{flex-wrap:wrap;padding:12px 16px;gap:10px;}
    .cursor{display:none;}
    .wordmark{font-size:13px;letter-spacing:3px;}
    .wordmark-group{flex:1 1 auto;}
    .header-right{flex:1 1 100%;justify-content:space-between;gap:12px;}
    .win-btn{padding:6px 10px;}
    .stats{gap:16px;}

    .legend{left:16px;right:16px;bottom:14px;gap:8px 12px;}

    /* drawer: stack inspect over feed instead of side-by-side */
    .drawer-bar{padding:0 16px;}
    .drawer.open{height:74vh;}
    .drawer-body{flex-direction:column;}
    .inspect{flex:0 0 auto;width:100%;max-height:42%;border-right:none;border-bottom:1px solid rgba(45,255,163,.08);padding:14px 16px;}
    /* nothing selected: hide the placeholder so the log gets the full height */
    .drawer.no-selection .inspect{display:none;}
    .feed-head{padding:12px 16px 8px;}
    .feed-rows{padding:0 16px 14px;}
    .feed-row{gap:8px;}
    .feed-row .time{flex:0 0 56px;}
    .feed-row .agent{flex:0 0 64px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="wordmark-group"><span class="wordmark">DOPPELGÄNGER</span><span class="cursor">█</span></div>
    <div class="header-right">
      <div class="windows" id="windows"></div>
      <div class="stats">
        <div class="stat"><span class="stat-label">RUNS</span><span class="stat-value" id="stat-runs">0</span></div>
        <div class="stat"><span class="stat-label">COST</span><span class="stat-value" id="stat-cost">$0.00</span></div>
        <div class="stat"><span class="stat-label">ACTIVE</span><span class="stat-value dim" id="stat-active">0</span></div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="starfield"><div id="stars1"></div><div id="stars2"></div></div>
    <svg class="edges-svg" id="edges" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="packets" id="packets"></div>
    <div class="nodes" id="nodes"></div>
    <div class="legend">
      <span><i style="background:#2dffa3;box-shadow:0 0 6px #2dffa3;"></i>RUNNING</span>
      <span><i style="background:rgba(90,210,160,.5);"></i>DONE</span>
      <span><i style="background:#ffb83d;"></i>FLAGGED</span>
      <span><i style="background:#ff5d52;"></i>ERROR</span>
      <span><i style="background:rgba(120,180,150,.25);"></i>IDLE</span>
    </div>
    <div class="scanlines"></div>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawer-bar" id="drawer-bar">
      <div class="drawer-bar-left">
        <span class="drawer-title">LOG</span>
        <span class="drawer-count" id="log-count">0 EVENTS</span>
        <span class="drawer-ticker" id="ticker"></span>
      </div>
      <span class="drawer-caret" id="caret">▴</span>
    </div>
    <div class="drawer-body">
      <div class="inspect" id="inspect"></div>
      <div class="feed-pane">
        <div class="feed-head">
          <span class="micro-label" id="feed-title">EVENT LOG</span>
        </div>
        <div class="feed-rows" id="feed"></div>
      </div>
    </div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
