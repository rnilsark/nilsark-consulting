name: doppelganger release

# Trunk-based. Every push to main that touches the runtime runs the gates (typecheck + tests).
# If they pass we ALWAYS advance the `stable` branch the prod box follows — that's the auto-deploy.
# A version tag (YYYY.N) is cut only when the commit message carries a [release] marker, so version
# numbers mean an intentional release rather than "every push".
on:
  push:
    branches: [main]
    paths:
      - 'doppelganger/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

# Serialize runs so the YYYY.N counter can't race between two pushes.
concurrency:
  group: doppelganger-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags to compute the next CalVer number

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        working-directory: doppelganger
        run: npm ci

      - name: Typecheck
        working-directory: doppelganger
        run: npm run typecheck

      - name: Test
        working-directory: doppelganger
        run: npm test

      - name: Advance stable (auto-deploy pointer)
        run: |
          set -euo pipefail
          # Force is safe: stable only ever moves forward to a gated main commit.
          git push --force origin "HEAD:refs/heads/stable"
          echo "stable -> $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"

      - name: Tag release (only when commit is marked [release])
        run: |
          set -euo pipefail
          if ! git log -1 --pretty=%B | grep -qF '[release]'; then
            echo "No [release] marker — stable advanced, no version tag." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          YEAR="$(date +%Y)"
          N="$(( $(git tag -l "${YEAR}.*" | wc -l) + 1 ))"
          TAG="${YEAR}.${N}"
          echo "Releasing ${TAG} @ $(git rev-parse --short HEAD)"
          git tag -a "${TAG}" -m "doppelganger ${TAG}"
          git push origin "${TAG}"
          echo "tagged ${TAG} @ $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"
