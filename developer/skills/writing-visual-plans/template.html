<!doctype html>
<html lang="en" data-font="default">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__TITLE__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfaf8;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e5e7eb;
      --card: #ffffff;
      --code-bg: #f4f4f3;
      --accent: #1d4ed8;
      --task-accent: #15803d;
      --task-soft: #dcfce7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161617;
        --fg: #f5f5f4;
        --muted: #a8a29e;
        --border: #2f2f31;
        --card: #1f1f21;
        --code-bg: #0d0d0e;
        --accent: #93c5fd;
        --task-accent: #86efac;
        --task-soft: #14532d;
      }
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--fg); scroll-behavior: smooth; }
    body {
      font-family: 'Atkinson Hyperlegible', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    html[data-font="dyslexic"] body { font-family: 'OpenDyslexic', 'Atkinson Hyperlegible', sans-serif; letter-spacing: 0.02em; word-spacing: 0.08em; }
    html[data-font="system"] body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    html[data-font="serif"] body { font-family: 'Georgia', 'Times New Roman', serif; }

    h1, h2, h3 { line-height: 1.25; font-weight: 700; }
    h1 { font-size: 2.8rem; margin: 0 0 1rem; }
    h2 { font-size: 1.8rem; margin: 0 0 1.25rem; }
    h3 { font-size: 1.1rem; margin: 1.25rem 0 0.4rem; }
    p { margin: 0.75rem 0; }
    a { color: var(--accent); }
    hr { border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.9em;
      background: var(--code-bg);
      padding: 0.1em 0.3em;
      border-radius: 3px;
    }
    pre {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.85em;
      background: var(--code-bg);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      line-height: 1.5;
      margin: 0.75rem 0;
    }
    pre code { background: none; padding: 0; font-size: 1em; }
    ul, ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    li { margin: 0.3rem 0; }
    blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 0.75rem 0; color: var(--muted); }

    /* Toolbar */
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 3rem;
    }
    .toolbar-title {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .slide-counter {
      font-size: 0.85rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 3.5rem;
      text-align: right;
    }
    .controls { display: flex; gap: 0.5rem; align-items: center; }
    .controls select {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.3rem 0.55rem;
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    .controls select:hover { border-color: var(--accent); }
    .controls label.font-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    main { padding-top: 3rem; }

    /* Slide */
    .slide {
      min-height: calc(100vh - 3rem);
      padding: 3rem 2rem 4rem;
      max-width: 84ch;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .slide:last-child { border-bottom: none; }
    .slide::after {
      content: attr(data-slide-num);
      position: absolute;
      bottom: 1rem;
      right: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      opacity: 0.6;
    }

    /* Title slide */
    .slide.title-slide {
      justify-content: center;
      align-items: flex-start;
    }
    .slide.title-slide::after { display: none; }
    .slide.title-slide h1 { font-size: 3rem; }
    .meta-block { color: var(--muted); font-size: 1rem; margin-top: 1.5rem; }
    .meta-block dl {
      margin: 0;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.4rem 1.5rem;
      max-width: 50rem;
    }
    .meta-block dt { font-weight: 700; text-transform: capitalize; }
    .meta-block dd { margin: 0; }

    /* Task slide */
    .slide.task-slide {
      border-left: 4px solid var(--task-accent);
      padding-left: 2rem;
    }
    .slide.task-slide .task-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--task-accent);
      margin-bottom: 0.5rem;
    }

    .slide-body > *:first-child { margin-top: 0; }
    .slide-body > *:last-child { margin-bottom: 0; }

    /* Mermaid */
    .mermaid {
      margin: 1.5rem 0;
      text-align: center;
      overflow-x: auto;
    }
    .mermaid svg { max-width: 100%; height: auto; }
    .mermaid-fallback {
      background: var(--code-bg);
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      margin: 1rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      white-space: pre;
      overflow-x: auto;
    }
    .mermaid-fallback::before {
      content: "Mermaid not loaded — source below:";
      display: block;
      font-family: inherit;
      color: var(--muted);
      font-size: 0.9em;
      margin-bottom: 0.5rem;
    }

    /* Disabled checkboxes from GFM task lists (decorative only) */
    li.task-item { list-style: none; margin-left: -1.5rem; }
    li.task-item input[type="checkbox"] {
      margin-right: 0.5rem;
      transform: translateY(2px);
      accent-color: var(--task-accent);
      pointer-events: none;
    }

    @media print {
      .toolbar { display: none !important; }
      main { padding-top: 0; }
      .slide {
        min-height: auto;
        max-width: none;
        padding: 1rem 1.5rem;
        page-break-after: always;
        border: none;
      }
      .slide::after { display: none; }
      .slide.task-slide { border-left: 2px solid #000; }
      pre { white-space: pre-wrap; word-break: break-word; }
    }
  </style>
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-title" id="toolbar-title">__TITLE__</div>
    <div class="slide-counter" id="slide-counter" aria-live="polite">1 / 1</div>
    <div class="controls">
      <label class="font-label" for="font-select">Font
        <select id="font-select" title="Body font">
          <option value="default">Atkinson Hyperlegible</option>
          <option value="dyslexic">OpenDyslexic</option>
          <option value="system">System default</option>
          <option value="serif">Serif (Georgia)</option>
        </select>
      </label>
    </div>
  </header>

  <main id="plan-root"></main>

  <script id="plan-source" type="text/plan">
__PLAN_SOURCE__
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script>
    (function() {
      'use strict';

      const titleTextDefault = document.title;
      const toolbarTitleEl = document.getElementById('toolbar-title');
      const counterEl = document.getElementById('slide-counter');
      const planRoot = document.getElementById('plan-root');
      const planSource = document.getElementById('plan-source').textContent;

      function parseSections(src) {
        const lines = src.split('\n');
        const sections = [];
        let current = null;
        let inFence = false;
        const headerRe = /^##\s+(\w[\w-]*):\s*(.+?)\s*$/;
        for (const line of lines) {
          if (/^```/.test(line)) inFence = !inFence;
          const m = !inFence ? line.match(headerRe) : null;
          if (m) {
            if (current) sections.push(current);
            current = { kind: m[1].toLowerCase(), title: m[2], body: [] };
          } else if (current) {
            current.body.push(line);
          }
        }
        if (current) sections.push(current);
        return sections.map(s => ({ ...s, body: s.body.join('\n').trim() }));
      }

      function renderMetaBlock(metas) {
        if (Object.keys(metas).length === 0) return null;
        const wrap = document.createElement('div');
        wrap.className = 'meta-block';
        const dl = document.createElement('dl');
        for (const [k, v] of Object.entries(metas)) {
          const dt = document.createElement('dt');
          dt.textContent = k.replace(/-/g, ' ');
          const dd = document.createElement('dd');
          dd.textContent = v;
          dl.append(dt, dd);
        }
        wrap.append(dl);
        return wrap;
      }

      function processMermaidIn(bodyEl) {
        bodyEl.querySelectorAll('pre > code.language-mermaid').forEach(code => {
          const pre = code.parentNode;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          pre.replaceWith(div);
        });
      }

      function decorateTaskList(bodyEl) {
        bodyEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          const li = cb.closest('li');
          if (li) li.classList.add('task-item');
        });
      }

      function renderTitleSlide(title, metas, num) {
        const slide = document.createElement('section');
        slide.className = 'slide title-slide';
        slide.dataset.slideNum = String(num);
        const h1 = document.createElement('h1');
        h1.textContent = title;
        slide.append(h1);
        const metaBlock = renderMetaBlock(metas);
        if (metaBlock) slide.append(metaBlock);
        return slide;
      }

      function renderSlide(section, num) {
        const slide = document.createElement('section');
        const isTask = section.kind === 'task';
        slide.className = 'slide ' + (isTask ? 'task-slide' : 'content-slide');
        slide.dataset.slideNum = String(num);
        slide.id = section.kind + '-' + section.title.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-+|-+$/g, '');

        if (isTask) {
          const label = document.createElement('span');
          label.className = 'task-label';
          label.textContent = 'Task';
          slide.append(label);
        }

        const h2 = document.createElement('h2');
        h2.textContent = section.title;
        slide.append(h2);

        const body = document.createElement('div');
        body.className = 'slide-body';
        body.innerHTML = marked.parse(section.body);
        processMermaidIn(body);
        decorateTaskList(body);
        slide.append(body);

        return slide;
      }

      // Font
      const fontSelect = document.getElementById('font-select');
      function setFont(mode) {
        document.documentElement.dataset.font = mode;
        if (fontSelect) fontSelect.value = mode;
        try { localStorage.setItem('pln:font', mode); } catch {}
      }
      fontSelect.addEventListener('change', e => setFont(e.target.value));

      // Slides + keyboard nav
      function getSlides() { return Array.from(document.querySelectorAll('.slide')); }
      function currentSlideIndex() {
        const slides = getSlides();
        if (slides.length === 0) return 0;
        const probe = window.scrollY + window.innerHeight * 0.3;
        for (let i = slides.length - 1; i >= 0; i--) {
          if (slides[i].offsetTop <= probe) return i;
        }
        return 0;
      }
      function goToSlide(i) {
        const slides = getSlides();
        const idx = Math.max(0, Math.min(slides.length - 1, i));
        if (slides[idx]) slides[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      function updateCounter() {
        const slides = getSlides();
        if (slides.length === 0) { counterEl.textContent = '0 / 0'; return; }
        counterEl.textContent = (currentSlideIndex() + 1) + ' / ' + slides.length;
      }
      window.addEventListener('scroll', updateCounter, { passive: true });
      window.addEventListener('resize', updateCounter);

      document.addEventListener('keydown', e => {
        if (e.target.closest('input, textarea, select, [contenteditable]')) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        const idx = currentSlideIndex();
        switch (e.key) {
          case 'ArrowRight':
          case 'ArrowDown':
          case 'PageDown':
          case ' ':
            e.preventDefault();
            goToSlide(idx + 1);
            break;
          case 'ArrowLeft':
          case 'ArrowUp':
          case 'PageUp':
            e.preventDefault();
            goToSlide(idx - 1);
            break;
          case 'Home':
            e.preventDefault();
            goToSlide(0);
            break;
          case 'End':
            e.preventDefault();
            goToSlide(getSlides().length - 1);
            break;
        }
      });

      // Mermaid
      function mermaidFallback() {
        document.querySelectorAll('.mermaid').forEach(el => {
          if (el.querySelector('svg')) return;
          const pre = document.createElement('pre');
          pre.className = 'mermaid-fallback';
          pre.textContent = el.textContent;
          el.replaceWith(pre);
        });
      }
      function renderMermaid() {
        if (!window.mermaid) {
          setTimeout(() => { if (!window.mermaid) mermaidFallback(); }, 3000);
          return;
        }
        try {
          mermaid.initialize({
            startOnLoad: false,
            theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
            securityLevel: 'strict',
          });
          const nodes = document.querySelectorAll('.mermaid');
          if (nodes.length === 0) return;
          mermaid.run({ nodes }).catch(err => { console.warn(err); mermaidFallback(); });
        } catch (err) {
          console.warn(err);
          mermaidFallback();
        }
      }

      function main() {
        // Title comes from <title> or from a meta:title section
        let title = (document.querySelector('title').textContent || '').trim();
        if (!title || title === '__TITLE__') title = titleTextDefault;

        try {
          const saved = localStorage.getItem('pln:font');
          if (saved) setFont(saved);
        } catch {}

        if (!window.marked) {
          const pre = document.createElement('pre');
          pre.textContent = 'marked.js failed to load (check network). Plan source:\n\n' + planSource;
          planRoot.append(pre);
          return;
        }

        marked.setOptions({ gfm: true, breaks: false });

        const sections = parseSections(planSource);
        const metas = {};
        const slideSections = [];
        for (const s of sections) {
          if (s.kind === 'meta') metas[s.title] = s.body;
          else slideSections.push(s);
        }

        // If user set meta:title, prefer it
        if (metas.title) title = metas.title;

        if (title && title !== '__TITLE__') {
          document.title = title;
          toolbarTitleEl.textContent = title;
        }

        planRoot.append(renderTitleSlide(title, metas, 1));
        slideSections.forEach((s, i) => {
          const el = renderSlide(s, i + 2);
          if (el) planRoot.append(el);
        });

        renderMermaid();
        updateCounter();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', main);
      } else {
        main();
      }
    })();
  </script>
</body>
</html>
